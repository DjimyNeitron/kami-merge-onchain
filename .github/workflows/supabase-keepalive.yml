name: Supabase keep-alive

# Supabase's free plan pauses a project after ~7 days with no activity.
# A tiny scheduled read keeps Postgres warm so the leaderboard never
# cold-starts (or worse, sleeps) for a visitor. GitHub-hosted cron can
# drift by a few minutes-to-hours, so the ~3-day cadence leaves plenty
# of slack against the 7-day window.

on:
  schedule:
    # 06:17 UTC every 3rd day-of-month (1,4,7,…,28). Off-the-hour minute
    # to avoid the top-of-hour congestion GitHub explicitly warns about.
    - cron: "17 6 */3 * *"
  # Manual trigger for testing / on-demand pings.
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping personal_bests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::Missing SUPABASE_URL or SUPABASE_ANON_KEY repo secret."
            exit 1
          fi
          # Strip any trailing slash on the base so we never build "//rest/v1".
          BASE="${SUPABASE_URL%/}"
          # personal_bests is a real table with a permissive public SELECT RLS
          # policy, so the anon key (public-safe; kept secret only to keep the
          # project ref out of source) can read it. A plain HTTP-200 read is
          # enough DB activity to keep the free-tier project from pausing —
          # no row-count assertion, so an empty table can't make it brittle.
          # (The old step queried weekly_leaderboard, which does not exist.)
          curl -fsS \
            "${BASE}/rest/v1/personal_bests?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -o /dev/null
          echo "Supabase keep-alive ping OK (personal_bests)."
